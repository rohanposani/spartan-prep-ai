// STUDY PLANNER
// ══════════════════════════════════════════════════════════════
function StudyPlanner({ tasks, setTasks }) {
  const [filter, setFilter] = useState('all');
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const emptyForm = {title:'',course:'',dueDate:'',priority:'normal',notes:''};
  const [form, setForm] = useState(emptyForm);

  const daysUntil = d => d ? Math.ceil((new Date(d)-new Date())/86400000) : 999;
  const urgency = t => {if(!t.dueDate) return 'normal'; const d=daysUntil(t.dueDate); if(d<=1) return 'urgent'; if(d<=4) return 'soon'; return 'normal';};
  const saveTask = () => {
    if (!form.title.trim()) return;
    if (editId) setTasks(p=>p.map(t=>t.id===editId?{...t,...form}:t));
    else setTasks(p=>[...p,{...form,id:Date.now(),done:false}]);
    setForm(emptyForm);setShowForm(false);setEditId(null);
  };
  const del = id => setTasks(p=>p.filter(t=>t.id!==id));
  const toggle = id => setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const edit = t => {setForm({title:t.title,course:t.course||'',dueDate:t.dueDate||'',priority:t.priority||'normal',notes:t.notes||''});setEditId(t.id);setShowForm(true);};

  const visible = tasks.map(t=>({...t,urg:urgency(t)})).filter(t => {
    if (filter==='pending') return !t.done;
    if (filter==='urgent') return !t.done&&t.urg==='urgent';
    if (filter==='done') return t.done;
    return true;
  }).sort((a,b) => {if(a.done!==b.done) return a.done?1:-1; const o={urgent:0,soon:1,normal:2}; return (o[a.urg]||2)-(o[b.urg]||2);});

  const done=tasks.filter(t=>t.done).length, pending=tasks.filter(t=>!t.done).length, pct=tasks.length?Math.round((done/tasks.length)*100):0;

  return (
    <div className="fade-in">
      <div className="flex aic jcb mb6">
        <div>
          <h2 style={{fontFamily:'Playfair Display,serif',fontSize:'23px'}}>Study Planner</h2>
          <p style={{color:'var(--gray-400)',fontSize:'12.5px'}}>Track assignments, tasks & exam deadlines</p>
        </div>
        <button className="btn btn-primary" onClick={() => {setShowForm(true);setEditId(null);setForm(emptyForm);}}>+ Add Task</button>
      </div>
      {showForm&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&(setShowForm(false),setEditId(null))}>
          <div className="modal fade-in">
            <div className="modal-title">{editId?'Edit Task':'New Task'}</div>
            <div style={{display:'flex',flexDirection:'column',gap:'13px'}}>
              <div><label style={{fontSize:'12px',fontWeight:'600',color:'var(--gray-600)',display:'block',marginBottom:'5px'}}>Task Title *</label><input className="inp" placeholder="e.g. Study Chapter 6" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                <div><label style={{fontSize:'12px',fontWeight:'600',color:'var(--gray-600)',display:'block',marginBottom:'5px'}}>Course</label><input className="inp" placeholder="e.g. BUS4 119B" value={form.course} onChange={e=>setForm(p=>({...p,course:e.target.value}))}/></div>
                <div><label style={{fontSize:'12px',fontWeight:'600',color:'var(--gray-600)',display:'block',marginBottom:'5px'}}>Due Date</label><input className="inp" type="date" value={form.dueDate} onChange={e=>setForm(p=>({...p,dueDate:e.target.value}))}/></div>
              </div>
              <div><label style={{fontSize:'12px',fontWeight:'600',color:'var(--gray-600)',display:'block',marginBottom:'5px'}}>Priority</label><select className="inp" value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}><option value="normal">Normal</option><option value="high">High</option><option value="urgent">Urgent</option></select></div>
              <div><label style={{fontSize:'12px',fontWeight:'600',color:'var(--gray-600)',display:'block',marginBottom:'5px'}}>Notes (optional)</label><textarea className="inp" rows={2} placeholder="Any extra notes…" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/></div>
              <div className="flex gap2" style={{justifyContent:'flex-end',marginTop:'4px'}}>
                <button className="btn btn-outline" onClick={() => {setShowForm(false);setEditId(null);}}>Cancel</button>
                <button className="btn btn-primary" onClick={saveTask} disabled={!form.title.trim()}>{editId?'Save Changes':'Add Task'}</button>
              </div>
            </div>
          </div>
        </div>
      )}
      <div className="grid-3 mb5">
        <div className="readiness-card">
          <div style={{fontSize:'11px',color:'rgba(255,255,255,.6)',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'8px'}}>Exam Readiness</div>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:'30px',marginBottom:'4px'}}>{pct}%</div>
          <div style={{fontSize:'12px',color:'rgba(255,255,255,.6)',marginBottom:'12px'}}>{done} of {tasks.length} tasks complete</div>
          {tasks.length>0&&<div style={{height:'5px',background:'rgba(255,255,255,.2)',borderRadius:'3px'}}><div style={{height:'100%',background:'var(--gold)',borderRadius:'3px',width:pct+'%',transition:'width .35s'}}/></div>}
        </div>
        <div className="card" style={{textAlign:'center'}}><div style={{fontSize:'24px',marginBottom:'6px'}}>📋</div><div style={{fontFamily:'Playfair Display,serif',fontSize:'28px',color:'var(--warning)'}}>{pending}</div><div style={{fontSize:'12px',color:'var(--gray-400)'}}>Pending Tasks</div></div>
        <div className="card" style={{textAlign:'center'}}><div style={{fontSize:'24px',marginBottom:'6px'}}>🚨</div><div style={{fontFamily:'Playfair Display,serif',fontSize:'28px',color:'var(--danger)'}}>{tasks.filter(t=>!t.done&&urgency(t)==='urgent').length}</div><div style={{fontSize:'12px',color:'var(--gray-400)'}}>Urgent</div></div>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'18px'}}>
        {[['all','All Tasks'],['pending','Pending'],['urgent','🚨 Urgent'],['done','✓ Done']].map(([id,lbl]) => <button key={id} className={'filter-tab'+(filter===id?' on':'')} onClick={() => setFilter(id)}>{lbl}</button>)}
      </div>
      {visible.length===0?(
        <div className="card empty"><div className="empty-ico">📅</div><div className="empty-head">{filter==='all'?'No tasks yet':'No tasks here'}</div><div className="empty-body">{filter==='all'?'Click "+ Add Task"':'Try "All Tasks"'}</div></div>
      ):(
        visible.map(t => {
          const d=t.dueDate?daysUntil(t.dueDate):null, u=t.urg;
          const dl = d!==null?(d<0?'Overdue':d===0?'Today':d===1?'Tomorrow':d+'d'):null;
          return (
            <div key={t.id} className={'task-card '+(t.done?'done-task':u)}>
              <div className="flex aic gap3">
                <div className={'task-check'+(t.done?' checked':'')} onClick={() => toggle(t.id)}>{t.done&&'✓'}</div>
                <div style={{flex:1}}>
                  <div className="flex aic gap2" style={{marginBottom:'5px'}}>
                    <span style={{fontSize:'14px',fontWeight:'500',textDecoration:t.done?'line-through':'none',color:t.done?'var(--gray-400)':'var(--gray-800)'}}>{t.title}</span>
                    {!t.done&&u==='urgent'&&<span className="badge badge-red">Urgent</span>}
                    {!t.done&&u==='soon'&&<span className="badge badge-orange">Soon</span>}
                    {t.priority==='high'&&!t.done&&u==='normal'&&<span className="badge badge-blue">High</span>}
                  </div>
                  <div className="flex aic gap3">
                    {t.course&&<span style={{fontSize:'12px',color:'var(--gray-400)'}}>📚 {t.course}</span>}
                    {t.dueDate&&<span style={{fontSize:'12px',color:u==='urgent'?'var(--danger)':u==='soon'?'var(--warning)':'var(--gray-400)'}}>📅 {new Date(t.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}{dl&&!t.done?' ('+dl+')':''}</span>}
                    {t.notes&&<span style={{fontSize:'12px',color:'var(--gray-400)'}} title={t.notes}>📝 Note</span>}
                  </div>
                </div>
                <div className="flex gap2">
                  <button className="btn btn-outline btn-xs" onClick={() => edit(t)}>Edit</button>
                  <button className="btn btn-danger btn-xs" onClick={() => del(t.id)}>✕</button>
                </div>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

// STUDY TIMER
// ══════════════════════════════════════════════════════════════
function StudyTimer() {
  const PRESETS = [{label:'25 / 5',work:25,brk:5},{label:'45 / 15',work:45,brk:15},{label:'50 / 10',work:50,brk:10},{label:'Custom',work:0,brk:0}];
  const [preset, setPreset] = useState(0);
  const [workMin, setWorkMin] = useState(25);
  const [brkMin, setBrkMin] = useState(5);
  const [phase, setPhase] = useState('work');
  const [running, setRunning] = useState(false);
  const [secs, setSecs] = useState(25*60);
  const [total, setTotal] = useState(25*60);
  const [sessions, setSessions] = useState([]);
  const [subject, setSubject] = useState('');
  const [cycles, setCycles] = useState(0);
  const [cw, setCw] = useState(25);
  const [cb, setCb] = useState(5);

  const wRef=useRef(25),bRef=useRef(5),subRef=useRef('');
  useEffect(() => {wRef.current=workMin;}, [workMin]);
  useEffect(() => {bRef.current=brkMin;}, [brkMin]);
  useEffect(() => {subRef.current=subject;}, [subject]);

  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      setSecs(s => {
        if (s>1) return s-1;
        clearInterval(id);setRunning(false);
        setPhase(p => {
          if (p==='work') {
            setCycles(c=>c+1);
            setSessions(prev=>[...prev,{subject:subRef.current||'General Study',duration:wRef.current,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}]);
            const bs=bRef.current*60;setTotal(bs);setTimeout(()=>setSecs(bs),0);return 'break';
          } else {
            const ws=wRef.current*60;setTotal(ws);setTimeout(()=>setSecs(ws),0);return 'work';
          }
        });
        return 0;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [running]);

  const applyPreset = i => {setPreset(i);setRunning(false);if(PRESETS[i].work>0){setWorkMin(PRESETS[i].work);setBrkMin(PRESETS[i].brk);const s=PRESETS[i].work*60;setSecs(s);setTotal(s);setPhase('work');}};
  const applyCustom = () => {const w=Math.max(1,Math.min(120,cw)),b=Math.max(1,Math.min(60,cb));setWorkMin(w);setBrkMin(b);const s=w*60;setSecs(s);setTotal(s);setPhase('work');setRunning(false);};
  const reset = () => {setRunning(false);const s=workMin*60;setSecs(s);setTotal(s);setPhase('work');};
  const skip = () => {const np=phase==='work'?'break':'work';setPhase(np);setRunning(false);const s=np==='break'?brkMin*60:workMin*60;setSecs(s);setTotal(s);};

  const fmt = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  const R=85, C=2*Math.PI*R, pct=total>0?secs/total:1, off=C*(1-pct);
  const col = phase==='work'?'var(--blue)':'var(--success)';
  const studyMin = sessions.reduce((a,s)=>a+s.duration,0);

  return (
    <div className="fade-in">
      <div className="mb6">
        <h2 style={{fontFamily:'Playfair Display,serif',fontSize:'23px'}}>Study Timer</h2>
        <p style={{color:'var(--gray-400)',fontSize:'12.5px'}}>Pomodoro-style focus sessions to maximize study efficiency</p>
      </div>
      <div className="grid-2">
        <div className="card" style={{textAlign:'center'}}>
          <div style={{marginBottom:'16px'}}>
            <span className="badge" style={{background:phase==='work'?'rgba(0,85,162,.1)':'rgba(34,197,94,.1)',color:col,fontSize:'12px',padding:'5px 16px'}}>
              {phase==='work'?'🎯 Focus Session':'☕ Break Time'}
            </span>
          </div>
          <div className="timer-ring-wrap">
            <svg className="timer-ring-svg" width="200" height="200" viewBox="0 0 200 200">
              <circle className="timer-ring-bg" cx="100" cy="100" r={R}/>
              <circle className="timer-ring-prog" cx="100" cy="100" r={R} stroke={col} strokeDasharray={C} strokeDashoffset={off}/>
            </svg>
            <div className="timer-ring-text">
              <div className="timer-digits">{fmt(secs)}</div>
              <div className="timer-phase-lbl" style={{color:col}}>{phase==='work'?'Work':'Break'}</div>
            </div>
          </div>
          <div className="timer-btn-row">
            <button className="tctrl tctrl-sm" onClick={reset} title="Reset">↺</button>
            <button className="tctrl tctrl-lg" onClick={() => setRunning(r=>!r)}>{running?'⏸':'▶'}</button>
            <button className="tctrl tctrl-sm" onClick={skip} title="Skip">⏭</button>
          </div>
          <div className="preset-row">
            {PRESETS.map((p,i) => <button key={i} className={'preset-btn'+(preset===i?' on':'')} onClick={() => applyPreset(i)}>{p.label}</button>)}
          </div>
          {preset===3&&(
            <div className="fade-in" style={{display:'flex',gap:'10px',alignItems:'flex-end',justifyContent:'center',marginBottom:'14px'}}>
              <div><div style={{fontSize:'11px',color:'var(--gray-400)',marginBottom:'4px'}}>Work (min)</div><input type="number" className="inp" style={{width:'80px',textAlign:'center'}} min="1" max="120" value={cw} onChange={e=>setCw(+e.target.value)}/></div>
              <div><div style={{fontSize:'11px',color:'var(--gray-400)',marginBottom:'4px'}}>Break (min)</div><input type="number" className="inp" style={{width:'80px',textAlign:'center'}} min="1" max="60" value={cb} onChange={e=>setCb(+e.target.value)}/></div>
              <button className="btn btn-primary btn-sm" onClick={applyCustom}>Set</button>
            </div>
          )}
          <input className="inp" placeholder="Subject / topic (optional)" value={subject} onChange={e=>setSubject(e.target.value)} style={{fontSize:'13px',marginTop:'6px'}}/>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            {[{ico:'🎯',val:cycles,lbl:'Sessions Done',clr:'var(--blue)'},{ico:'⏱',val:studyMin+'m',lbl:'Total Studied',clr:'var(--gold)'}].map((s,i) => (
              <div key={i} className="card" style={{textAlign:'center',padding:'16px'}}>
                <div style={{fontSize:'20px',marginBottom:'5px'}}>{s.ico}</div>
                <div style={{fontFamily:'Playfair Display,serif',fontSize:'22px',color:s.clr}}>{s.val}</div>
                <div style={{fontSize:'11.5px',color:'var(--gray-400)'}}>{s.lbl}</div>
              </div>
            ))}
          </div>
          <div style={{background:'var(--gold-pale)',border:'1px solid rgba(229,168,35,.25)',borderRadius:'var(--r)',padding:'16px'}}>
            <div style={{fontSize:'12px',fontWeight:'700',color:'#92680A',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'10px'}}>✦ Spartan Study Tips</div>
            {['Take real breaks — step away from your screen','Review your notes at the start of each session','Silence notifications during focus sessions','Stay hydrated — water boosts concentration'].map((tip,i) => (
              <div key={i} style={{display:'flex',gap:'8px',marginBottom:'7px'}}>
                <span style={{color:'var(--gold)',fontWeight:'700',flexShrink:0}}>·</span>
                <span style={{fontSize:'12.5px',color:'#7A5000'}}>{tip}</span>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="flex aic jcb" style={{marginBottom:'12px'}}>
              <div style={{fontSize:'13.5px',fontWeight:'600'}}>Session Log</div>
              {sessions.length>0&&<button className="btn btn-outline btn-xs" onClick={() => setSessions([])}>Clear</button>}
            </div>
            {sessions.length===0?(
              <p style={{fontSize:'13px',color:'var(--gray-400)',textAlign:'center',padding:'16px 0'}}>Start a session to log your progress</p>
            ):(
              <div className="session-log">
                {[...sessions].reverse().map((s,i) => (
                  <div key={i} className="slog-row">
                    <div><div style={{fontSize:'13px',fontWeight:'500'}}>{s.subject}</div><div style={{fontSize:'11.5px',color:'var(--gray-400)'}}>{s.time}</div></div>
                    <span className="badge badge-blue">{s.duration}m</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// AUTH GATE — SJSU Email Verification
// ══════════════════════════════════════════════════════════════
function AuthGate({ onAuth }) {
  const [email, setEmail] = useState('');
  const [err, setErr] = useState('');

  const submit = () => {
    const trimmed = email.trim().toLowerCase();
    if (!trimmed) { setErr('Please enter your SJSU email address.'); return; }
    if (!trimmed.endsWith('@sjsu.edu')) { setErr('Please enter a valid @sjsu.edu email address.'); return; }
    localStorage.setItem('sjsu_email', trimmed);
    onAuth(trimmed);
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 50%, var(--blue-deeper) 100%)'}}>
      <div style={{background:'#fff',borderRadius:'var(--r-lg)',padding:'40px',maxWidth:'420px',width:'92%',boxShadow:'var(--shadow-lg)',textAlign:'center'}}>
        <div style={{width:'56px',height:'56px',background:'var(--gold)',borderRadius:'14px',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',color:'var(--blue-dark)',fontSize:'20px',margin:'0 auto 18px'}}>SP</div>
        <h1 style={{fontFamily:'Playfair Display,serif',fontSize:'24px',color:'var(--gray-800)',marginBottom:'6px'}}>Spartan Prep AI</h1>
        <p style={{fontSize:'13.5px',color:'var(--gray-400)',marginBottom:'28px'}}>Sign in with your SJSU email to continue</p>
        {err && <div className="alert alert-warn" style={{textAlign:'left',marginBottom:'14px'}}>⚠️ {err}</div>}
        <input
          className="inp"
          type="email"
          placeholder="your.name@sjsu.edu"
          value={email}
          onChange={e => { setEmail(e.target.value); setErr(''); }}
          onKeyDown={e => e.key === 'Enter' && submit()}
          style={{marginBottom:'16px'}}
        />
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px'}} onClick={submit}>
          Verify & Continue →
        </button>
        <p style={{fontSize:'11.5px',color:'var(--gray-400)',marginTop:'18px'}}>Only @sjsu.edu email addresses are accepted</p>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════
function App() {
  const [userEmail, setUserEmail] = useState(() => localStorage.getItem('sjsu_email') || '');
  const [page, setPage] = useState('dashboard');
  const [files, setFiles] = useState([]);
  const [ctx, setCtx] = useState('');
  const [cards, setCards] = useState([]);
  const [scores, setScores] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [notes, setNotes] = useState([]);
  const [processing, setProcessing] = useState(false);
  const [toast, setToast] = useState(null);

  if (!userEmail) {
    return <AuthGate onAuth={setUserEmail} />;
  }

  const showToast = (message, type) => setToast({message,type});

  const meta = {
    dashboard:{title:'Spartan Study',sub:'Your AI-powered exam preparation hub'},
    flashcards:{title:'Flashcard Deck',sub:'Active recall for deep understanding'},
    quiz:{title:'Spartan Quiz',sub:'AI-generated exam simulator'},
    simplifier:{title:'Concept Simplifier',sub:'Transform complex jargon into clarity'},
    tutor:{title:'Academic Tutor',sub:'24/7 AI study companion'},
    faq:{title:'FAQ Matrix',sub:'Auto-extracted course knowledge base'},
    notes:{title:'Notes',sub:'Create and organize study notes'},
    planner:{title:'Study Planner',sub:'Track tasks and exam deadlines'},
    timer:{title:'Study Timer',sub:'Pomodoro focus sessions'},
  };

  const onUpload = async (file) => {
    setProcessing(true);
    try {
      let text='';
      const ext=file.name.split('.').pop().toLowerCase();
      if (ext==='pdf') text=await parsePDF(file);
      if (ext==='doc') text=await parseDOC(file);
      if (ext==='docx') text=await parseDOCX(file);
      if (ext==='ppt') text=await parsePPT(file);
      if (ext==='pptx') text=await parsePPTX(file);
      if (!text) throw new Error('Unsupported file type');
      setFiles(prev=>[...prev,{name:file.name,text}]);
      setCtx(prev=>prev+'\n\n═══ '+file.name+' ═══\n'+text);
      showToast('📁 '+file.name+' loaded successfully','success');
    } catch(e) {console.error('Parse error:',e);showToast('Failed to parse '+file.name,'error');}
    setProcessing(false);
  };

  const onRemove = i => {
    const rm=files[i];
    setFiles(prev=>prev.filter((_,j)=>j!==i));
    setCtx(prev => {
      const marker='\n\n═══ '+rm.name+' ═══\n';
      const s=prev.indexOf(marker);
      if (s===-1) return prev;
      const e=prev.indexOf('\n\n═══ ',s+marker.length);
      return prev.slice(0,s)+(e===-1?'':prev.slice(e));
    });
    showToast(rm.name+' removed','success');
  };

  const {title,sub} = meta[page]||{title:'Spartan Prep',sub:''};

  return (
    <div className="layout">
      <Sidebar page={page} go={setPage} files={files} onUpload={onUpload} onRemove={onRemove} userEmail={userEmail} onSignOut={() => { localStorage.removeItem('sjsu_email'); setUserEmail(''); }}/>
      <div className="main">
        <div className="topbar">
          <div><div className="topbar-title">{title}</div><div className="topbar-sub">{sub}</div></div>
          <div className="flex aic gap3">
            {processing&&<div className="flex aic gap2" style={{fontSize:'12.5px',color:'var(--gray-400)'}}><div className="spin spin-blue" style={{width:'13px',height:'13px'}}/>Parsing file…</div>}
            <span className="badge badge-gold">✦ GPT-4.1-mini</span>
          </div>
        </div>
        <div className="content">
          {page==='dashboard'&&<Dashboard files={files} flashcards={cards} scores={scores} tasks={tasks} notes={notes} go={setPage}/>}
          {page==='flashcards'&&<Flashcards ctx={ctx} files={files} cards={cards} setCards={setCards}/>}
          {page==='quiz'&&<Quiz ctx={ctx} files={files} onScore={s=>setScores(p=>[...p,s])}/>}
          {page==='simplifier'&&<Simplifier ctx={ctx}/>}
          {page==='tutor'&&<Tutor ctx={ctx}/>}
          {page==='faq'&&<FAQMatrix ctx={ctx}/>}
          {page==='notes'&&<Notes notes={notes} setNotes={setNotes} ctx={ctx}/>}
          {page==='planner'&&<StudyPlanner tasks={tasks} setTasks={setTasks}/>}
          {page==='timer'&&<StudyTimer/>}
        </div>
      </div>
      {toast&&<Toast message={toast.message} type={toast.type} onClose={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
